site_name: oneflake
site_description: High-performance 64-bit ID generation for distributed systems.
site_url: https://felipediel.github.io/oneflake/
repo_name: felipediel/oneflake
repo_url: https://github.com/felipediel/oneflake
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      custom_templates: docs/overrides/mkdocstrings
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            members_order: source
            show_submodules: false
            filters:
              - "!^__version__$"

nav:
  - Introduction: index.md
  - Learn:
      - Installation: learn/installation.md
      - Basic Usage: learn/basic-usage.md
      - Advanced Usage: learn/advanced-usage.md
      - Common ID Profiles: learn/common-id-profiles.md
      - Thread Safety Model: learn/thread-safety-model.md
      - Error Handling: learn/error-handling.md
  - Reference:
      - FlakeGenerator: reference/flake-generator.md
      - FlakeDecoder: reference/flake-decoder.md
      - FlakeParts: reference/flake-parts.md
      - Constants: reference/constants.md
      - Exceptions: reference/exceptions.md
  - Resources:
      - FAQ: resources/faq.md
  - About: about/about.md
  - Release Notes: release/release-notes.md
